# DeepeResearch — Default Model Definitions
# Models supported by LiteLLM for research agent execution.

models:
  - id: gpt-4o
    provider: openai
    display_name: GPT-4o
    default: true
    context_window: 128000

  - id: gpt-4o-mini
    provider: openai
    display_name: GPT-4o Mini
    context_window: 128000

  - id: claude-sonnet-4-20250514
    provider: anthropic
    display_name: Claude Sonnet 4
    context_window: 200000

  - id: claude-haiku-3-5
    provider: anthropic
    display_name: Claude Haiku 3.5
    context_window: 200000

  - id: ollama/llama3.1
    provider: ollama
    display_name: Llama 3.1 (Ollama)
    context_window: 128000

  - id: ollama/mixtral
    provider: ollama
    display_name: Mixtral (Ollama)
    context_window: 32000
