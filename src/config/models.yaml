# DeepeResearch — Default Model Definitions
# Models supported by LiteLLM for research agent execution.

models:
  - id: gpt-4o
    provider: openai
    display_name: GPT-4o
    context_window: 128000

  - id: gpt-4o-mini
    provider: openai
    display_name: GPT-4o Mini
    context_window: 128000

  - id: claude-sonnet-4-20250514
    provider: anthropic
    display_name: Claude Sonnet 4
    context_window: 200000

  - id: claude-haiku-3-5
    provider: anthropic
    display_name: Claude Haiku 3.5
    context_window: 200000

  - id: ollama/llama3.1
    provider: ollama
    display_name: Llama 3.1 (Ollama)
    context_window: 128000

  - id: ollama/mixtral
    provider: ollama
    display_name: Mixtral (Ollama)
    context_window: 32000

  # OpenRouter models
  - id: deepseek/deepseek-v4-flash
    provider: openrouter
    display_name: DeepSeek V4 Flash
    context_window: 1048576
    supports_tools: true
    supports_structured: true
    cost_per_m_input: 0.09
    cost_per_m_output: 0.18
    default: true  # Default for quick/medium sessions

  - id: google/gemini-3-flash-preview
    provider: openrouter
    display_name: Gemini 3 Flash Preview
    context_window: 1048576
    supports_tools: true
    supports_structured: true
    cost_per_m_input: 0.50
    cost_per_m_output: 3.00
    recommended_for: deep

  - id: xiaomi/mimo-v2.5
    provider: openrouter
    display_name: Xiaomi MiMo V2.5
    context_window: 1048576
    supports_tools: true
    supports_structured: true
    cost_per_m_input: 0.14
    cost_per_m_output: 0.28
    recommended_for: medium
